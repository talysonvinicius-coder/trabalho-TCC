<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | Hip-Hop — Comentários</title>
    <link rel="stylesheet" href="assets/css/genero.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🎶 SoundScore</div>
        <nav>
            <ul>
                <li><a href="paginicial.html">Início</a></li>
                <li><a href="buscar.html">Buscar</a></li>
                <li><a href="biblioteca.html">Biblioteca</a></li>
                <li><a href="premium.html">Premium</a></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <h2>Deixe sua opinião sobre Hip-Hop</h2>

        <div class="register-form">
            <fieldset>
                <div class="musica">
                    <h2>50 Cent — In da Club</h2>
                    <label for="op1">Sua opinião sobre a música:</label>
                    <textarea id="op1" placeholder="Ex: Música ótima para animar!"></textarea>
                </div>

                <div class="musica">
                    <h2>Racionais MC's — Vida Loka Pt. 1</h2>
                    <label for="op2">Sua opinião sobre a música:</label>
                    <textarea id="op2" placeholder="Ex: Letra muito reflexiva!"></textarea>
                </div>

                <div class="musica">
                    <h2>Emicida — Levanta e Anda</h2>
                    <label for="op3">Sua opinião sobre a música:</label>
                    <textarea id="op3" placeholder="Ex: Muito inspiradora!"></textarea>
                </div>

                <div class="musica">
                    <h2>Criolo — Não Existe Amor em SP</h2>
                    <label for="op4">Sua opinião sobre a música:</label>
                    <textarea id="op4" placeholder="Ex: Batida incrível!"></textarea>
                </div>

                <div class="actions">
                    <a href="hiphop.html" class="btn-acao">Voltar</a>
                    <a href="paginicial.html" class="btn-acao primario">Finalizar</a>
                </div>
            </fieldset>
        </div>
    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/genero.js"></script>
</body>
</html>
