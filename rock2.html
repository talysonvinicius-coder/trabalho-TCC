<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | Rock — Comentários</title>
    <link rel="stylesheet" href="assets/css/genero.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🎶 SoundScore</div>
        <nav>
            <ul>
                <li><a href="paginicial.html">Início</a></li>
                <li><a href="buscar.html">Buscar</a></li>
                <li><a href="biblioteca.html">Biblioteca</a></li>
                <li><a href="premium.html">Premium</a></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <h2>Deixe sua opinião sobre Rock</h2>

        <div class="register-form">
            <fieldset>
                <div class="musica">
                    <h2>Queen — Bohemian Rhapsody</h2>
                    <label for="op1">Sua opinião sobre a música:</label>
                    <textarea id="op1" placeholder="Ex: Uma ópera no rock!"></textarea>
                </div>

                <div class="musica">
                    <h2>Nirvana — Smells Like Teen Spirit</h2>
                    <label for="op2">Sua opinião sobre a música:</label>
                    <textarea id="op2" placeholder="Ex: Definiu uma geração!"></textarea>
                </div>

                <div class="musica">
                    <h2>Led Zeppelin — Stairway to Heaven</h2>
                    <label for="op3">Sua opinião sobre a música:</label>
                    <textarea id="op3" placeholder="Ex: Solo de guitarra épico!"></textarea>
                </div>

                <div class="musica">
                    <h2>Legião Urbana — Tempo Perdido</h2>
                    <label for="op4">Sua opinião sobre a música:</label>
                    <textarea id="op4" placeholder="Ex: Clássico do rock nacional!"></textarea>
                </div>

                <div class="actions">
                    <a href="rock.html" class="btn-acao">Voltar</a>
                    <a href="paginicial.html" class="btn-acao primario">Finalizar</a>
                </div>
            </fieldset>
        </div>
    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/genero.js"></script>
</body>
</html>
