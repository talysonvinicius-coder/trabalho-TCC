<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | POP — Comentários</title>
    <link rel="stylesheet" href="assets/css/genero.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🎶 SoundScore</div>
        <nav>
            <ul>
                <li><a href="paginicial.html">Início</a></li>
                <li><a href="buscar.html">Buscar</a></li>
                <li><a href="biblioteca.html">Biblioteca</a></li>
                <li><a href="premium.html">Premium</a></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <h2>Deixe sua opinião sobre POP</h2>

        <div class="register-form">
            <fieldset>
                <div class="musica">
                    <h2>The Weeknd — Blinding Lights</h2>
                    <label for="op1">Sua opinião sobre a música:</label>
                    <textarea id="op1" placeholder="Ex: Vibe dos anos 80 perfeita!"></textarea>
                </div>

                <div class="musica">
                    <h2>Dua Lipa — Levitating</h2>
                    <label for="op2">Sua opinião sobre a música:</label>
                    <textarea id="op2" placeholder="Ex: Impossível não dançar!"></textarea>
                </div>

                <div class="musica">
                    <h2>Taylor Swift — Anti-Hero</h2>
                    <label for="op3">Sua opinião sobre a música:</label>
                    <textarea id="op3" placeholder="Ex: Letra muito honesta!"></textarea>
                </div>

                <div class="musica">
                    <h2>Harry Styles — As It Was</h2>
                    <label for="op4">Sua opinião sobre a música:</label>
                    <textarea id="op4" placeholder="Ex: Muito melancólica e bonita!"></textarea>
                </div>

                <div class="actions">
                    <a href="pop.html" class="btn-acao">Voltar</a>
                    <a href="paginicial.html" class="btn-acao primario">Finalizar</a>
                </div>
            </fieldset>
        </div>
    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/genero.js"></script>
</body>
</html>
