<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

    <div class="main-wrapper">
        <h1 class="brand-name">SoundScore</h1>

        <div class="login-card">
            <h2 style="font-size: 20px; opacity: 0.5; letter-spacing: 4px; margin-bottom: 25px;">
                Fazer Login
            </h2>

            <div id="msg-erro" class="alert alert-danger" style="display:none; padding:8px; font-size:14px;"></div>
            <div id="msg-sucesso" class="alert alert-success" style="display:none; padding:8px; font-size:14px;">
                Cadastro realizado com sucesso!
            </div>

            <form id="form-login" autocomplete="on" action="paginicial.php">
                <input type="email" name="email" placeholder="Insira seu email" required>
                <input type="password" name="senha" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>

            <p style="margin-top: 16px;">Não tem conta? <a href="cadastro.html">Registre-se</a></p>
        </div>

        <div class="waves-box">
            <svg class="waves-svg" viewBox="0 24 150 28" preserveAspectRatio="none">
                <defs>
                    <path id="gentle-wave"
                        d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
                </defs>
                <g class="parallax">
                    <use href="#gentle-wave" x="48" y="0" class="onda-ciano" />
                    <use href="#gentle-wave" x="48" y="3" class="onda-roxa" />
                    <use href="#gentle-wave" x="48" y="5" class="onda-rosa" />
                    <use href="#gentle-wave" x="48" y="7" class="onda-branca" />
                    <use href="#gentle-wave" x="48" y="9" class="onda-verde" />
                </g>
            </svg>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Exibe mensagem de cadastro concluído se vier da página de cadastro
        const params = new URLSearchParams(window.location.search);
        if (params.get('cadastro') === '1') {
            document.getElementById('msg-sucesso').style.display = 'block';
        }
    </script>
</body>

</html>
