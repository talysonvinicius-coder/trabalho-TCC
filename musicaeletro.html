<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | Música Eletrônica</title>
    <link rel="stylesheet" href="assets/css/genero.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🎶 SoundScore</div>
        <nav>
            <ul>
                <li><a href="paginicial.html">Início</a></li>
                <li><a href="buscar.html">Buscar</a></li>
                <li><a href="biblioteca.html">Biblioteca</a></li>
                <li><a href="premium.html">Premium</a></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <h2>Avalie suas faixas de Música Eletrônica</h2>

        <fieldset>
            <div class="musica">
                <h2>M83 — Midnight City</h2>
                <div class="star-rating">
                    <input type="radio" id="m1-s5" name="rating-1" value="5"><label for="m1-s5">★</label>
                    <input type="radio" id="m1-s4" name="rating-1" value="4"><label for="m1-s4">★</label>
                    <input type="radio" id="m1-s3" name="rating-1" value="3"><label for="m1-s3">★</label>
                    <input type="radio" id="m1-s2" name="rating-1" value="2"><label for="m1-s2">★</label>
                    <input type="radio" id="m1-s1" name="rating-1" value="1"><label for="m1-s1">★</label>
                </div>
            </div>

            <div class="musica">
                <h2>Daft Punk — Get Lucky</h2>
                <div class="star-rating">
                    <input type="radio" id="m2-s5" name="rating-2" value="5"><label for="m2-s5">★</label>
                    <input type="radio" id="m2-s4" name="rating-2" value="4"><label for="m2-s4">★</label>
                    <input type="radio" id="m2-s3" name="rating-2" value="3"><label for="m2-s3">★</label>
                    <input type="radio" id="m2-s2" name="rating-2" value="2"><label for="m2-s2">★</label>
                    <input type="radio" id="m2-s1" name="rating-2" value="1"><label for="m2-s1">★</label>
                </div>
            </div>

            <div class="musica">
                <h2>Tame Impala — Breathe Deeper</h2>
                <div class="star-rating">
                    <input type="radio" id="m3-s5" name="rating-3" value="5"><label for="m3-s5">★</label>
                    <input type="radio" id="m3-s4" name="rating-3" value="4"><label for="m3-s4">★</label>
                    <input type="radio" id="m3-s3" name="rating-3" value="3"><label for="m3-s3">★</label>
                    <input type="radio" id="m3-s2" name="rating-3" value="2"><label for="m3-s2">★</label>
                    <input type="radio" id="m3-s1" name="rating-3" value="1"><label for="m3-s1">★</label>
                </div>
            </div>

            <div class="musica">
                <h2>Gorillaz — Feel Good Inc.</h2>
                <div class="star-rating">
                    <input type="radio" id="m4-s5" name="rating-4" value="5"><label for="m4-s5">★</label>
                    <input type="radio" id="m4-s4" name="rating-4" value="4"><label for="m4-s4">★</label>
                    <input type="radio" id="m4-s3" name="rating-4" value="3"><label for="m4-s3">★</label>
                    <input type="radio" id="m4-s2" name="rating-4" value="2"><label for="m4-s2">★</label>
                    <input type="radio" id="m4-s1" name="rating-4" value="1"><label for="m4-s1">★</label>
                </div>
            </div>

            <div class="actions">
                <a href="paginicial.html" class="btn-acao">Voltar</a>
                <a href="paginicial.html" class="btn-acao primario">Finalizar</a>
            </div>
        </fieldset>
    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/genero.js"></script>
</body>
</html>
