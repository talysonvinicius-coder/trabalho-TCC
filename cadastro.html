<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | Cadastro</title>
    <link rel="stylesheet" href="assets/css/cadastrarmusic.css">
</head>
<body>
    <div class="register-fieldset">    
<fieldset>
 <legend>Administração</legend>
 <form action="controller/TestarConexaoControl.php"
method="post">
 <button type="submit">Testar Conexão com o Banco</button>
 </form>
 </fieldset>
 </div> 

<div class="container">
    <div class="title">
        <h1>Vem avaliar com a gente!</h1>
    </div>

    <div class="register-form">
        <form id="form-cadastro" autocomplete="on">
            <h2>Dados pessoais</h2>

            <div id="msg-erro" class="msg-erro" style="display:none;"></div>

            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" placeholder="Nome Completo" minlength="3" maxlength="50" required>
            </p>

            <p>
                <label for="iemail">Email:</label>
                <input type="email" name="email" id="iemail" placeholder="seuemail@exemplo.com" required>
            </p>

            <p>
                <label for="isenha">Crie uma senha:</label>
                <input type="password" name="senha" id="isenha" placeholder="Mínimo 5 caracteres" minlength="5" required>
            </p>

            <p>
                <label for="iconfirma">Confirme a senha:</label>
                <input type="password" name="confirma" id="iconfirma" placeholder="Repita a senha" minlength="5" required>
            </p>
             <label for="iperfil">Perfil:</label><br>
        <select name="perfil" required>
            <option value="cliente">Cliente</option>
            <option value="admin">Admin</option>
        </select>

            <button type="submit">Cadastrar</button>
        </form>

        <p style="margin-top: 16px; text-align: center;">
            Já tem conta? <a href="index.html">Fazer login</a>
        </p>
    </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/cadastro.js"></script>
</body>
</html>
