<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
    <style>
        .login-card { width: 360px; }

        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        select option { background: #05070a; }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            opacity: 0.6;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1 class="brand-name">SoundScore</h1>

    <div class="login-card">
        <h2 style="font-size: 20px; opacity: 0.5; letter-spacing: 4px; margin-bottom: 25px;">
            Criar Conta
        </h2>

        <div id="msg-erro" class="alert alert-danger" style="display:none; padding:8px; font-size:14px;"></div>

        <form id="form-cadastro" autocomplete="on">
            <label for="inome">Nome</label>
            <input type="text" name="nome" id="inome" placeholder="Nome Completo" minlength="3" maxlength="100" required>

            <label for="iemail">Email</label>
            <input type="email" name="email" id="iemail" placeholder="seuemail@exemplo.com" required>

            <label for="isenha">Senha</label>
            <input type="password" name="senha" id="isenha" placeholder="Mínimo 5 caracteres" minlength="5" required>

            <label for="iconfirma">Confirme a senha</label>
            <input type="password" name="confirma" id="iconfirma" placeholder="Repita a senha" minlength="5" required>

            <label for="iperfil">Perfil</label>
            <select name="perfil_id" id="iperfil" required>
                <option value="1">Usuário</option>
                <option value="2">Admin</option>
            </select>

            <label for="iplano">Plano</label>
            <select name="plano_id" id="iplano" required>
                <option value="1">Free</option>
                <option value="2">Premium</option>
            </select>

            <button type="submit">Cadastrar</button>
        </form>

        <p style="margin-top: 16px;">Já tem conta? <a href="login.html">Fazer login</a></p>
    </div>

    <div class="waves-box">
        <svg class="waves-svg" viewBox="0 24 150 28" preserveAspectRatio="none">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"/>
            </defs>
            <g class="parallax">
                <use href="#gentle-wave" x="48" y="0" class="onda-ciano"/>
                <use href="#gentle-wave" x="48" y="3" class="onda-roxa"/>
                <use href="#gentle-wave" x="48" y="5" class="onda-rosa"/>
                <use href="#gentle-wave" x="48" y="7" class="onda-branca"/>
                <use href="#gentle-wave" x="48" y="9" class="onda-verde"/>
            </g>
        </svg>
    </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/cadastro.js"></script>
</body>
</html>
