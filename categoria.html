<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScore | Criar Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
    <style>
        .login-card { width: 360px; }

        select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
            box-sizing: border-box;
            resize: vertical;
        }

        select option { background: #05070a; }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            opacity: 0.6;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .btn-secondary {
            width: 80%;
            margin-top: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.14);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1 class="brand-name">SoundScore</h1>

    <div class="login-card">
        <h2 style="font-size: 20px; opacity: 0.5; letter-spacing: 4px; margin-bottom: 25px;">
            Criar Categoria
        </h2>

        <div id="msg-erro" class="alert alert-danger" style="display:none; padding:8px; font-size:14px;"></div>
        <div id="msg-sucesso" class="alert alert-success" style="display:none; padding:8px; font-size:14px;"></div>

        <form id="form-categoria" action="controller/CategoriaControl.php" method="POST" autocomplete="on">
            <label for="nomeCategoria">Nome da categoria</label>
            <input type="text" name="nome" id="nomeCategoria" placeholder="Ex: Pop, Rock, Jazz" maxlength="100" required>

            <label for="descricaoCategoria">Descrição</label>
            <textarea name="descricao" id="descricaoCategoria" rows="4" placeholder="Descrição da categoria"></textarea>

            <label for="statusCategoria">Status</label>
            <select name="status" id="statusCategoria" required>
                <option value="1">Ativa</option>
                <option value="0">Inativa</option>
            </select>

            <button type="submit">Salvar Categoria</button>
        </form>

        <a href="homeAdmin.html" class="btn btn-secondary">Voltar ao Painel Admin</a>
    </div>

    <div class="waves-box">
        <svg class="waves-svg" viewBox="0 24 150 28" preserveAspectRatio="none">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"/>
            </defs>
            <g class="parallax">
                <use href="#gentle-wave" x="48" y="0" class="onda-ciano"/>
                <use href="#gentle-wave" x="48" y="3" class="onda-roxa"/>
                <use href="#gentle-wave" x="48" y="5" class="onda-rosa"/>
                <use href="#gentle-wave" x="48" y="7" class="onda-branca"/>
                <use href="#gentle-wave" x="48" y="9" class="onda-verde"/>
            </g>
        </svg>
    </div>
</div>

<script src="assets/js/app.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const msgErro = params.get('erro');
    const msgSucesso = params.get('sucesso');
    if (msgErro) {
        const el = document.getElementById('msg-erro');
        el.textContent = decodeURIComponent(msgErro);
        el.style.display = 'block';
    }
    if (msgSucesso) {
        const el = document.getElementById('msg-sucesso');
        el.textContent = decodeURIComponent(msgSucesso);
        el.style.display = 'block';
    }
</script>
</body>
</html>
